<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Project Klinik</title>
  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="#">Klinik Sehat</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#dokter">Dokter</a></li>
          <li class="nav-item"><a class="nav-link" href="#kontak">Kontak</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <header class="bg-light py-5 text-center">
    <div class="container">
      <h1>Selamat Datang di Klinik Sehat</h1>
      <p class="lead">Melayani kesehatan Anda dengan profesional dan ramah</p>
    </div>
  </header>

  <!-- Section Dokter -->
  <section id="dokter" class="py-5">
    <div class="container">
      <h2 class="mb-4 text-center">Tim Dokter Kami</h2>
      <div class="row g-4">
        <!-- Card Dokter 1 -->
        <div class="col-md-4">
          <div class="card">
            <img src="WhatsApp Image 2026-04-06 at 13.05.20.jpeg" class="card-img-top" alt="Dokter A">
            <div class="card-body">
              <h5 class="card-title">Dr. Keisha</h5>
              <p class="card-text">Spesialis Anak</p>
            </div>
          </div>
        </div>
        <!-- Card Dokter 2 -->
        <div class="col-md-4">
          <div class="card">
            <img src="WhatsApp Image 2026-04-06 at 13.05.47.jpeg" class="card-img-top" alt="Dokter B">
            <div class="card-body">
              <h5 class="card-title">Dr. Dini</h5>
              <p class="card-text">Spesialis Gigi</p>
            </div>
          </div>
        </div>
        <!-- Card Dokter 3 -->
        <div class="col-md-4">
          <div class="card">
            <img src="WhatsApp Image 2026-04-06 at 13.02.47.jpeg" class="card-img-top" alt="Dokter C">
            <div class="card-body">
              <h5 class="card-title">Dr. Keisha</h5>
              <p class="card-text">Spesialis Umum</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Section Kontak -->
  <section id="kontak" class="py-5 bg-light">
    <div class="container">
      <h2 class="mb-4 text-center">Kontak Kami</h2>
      <form>
        <div class="mb-3">
          <label for="nama" class="form-label">Nama</label>
          <input type="text" class="form-control" id="nama" placeholder="Masukkan nama Anda">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="Masukkan email Anda">
        </div>
        <div class="mb-3">
          <label for="pesan" class="form-label">Pesan</label>
          <textarea class="form-control" id="pesan" rows="4" placeholder="Tulis pesan Anda"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Kirim</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="py-3 bg-primary text-white text-center">
    <div class="container">
      &copy; 2026 Klinik Sehat. Semua hak dilindungi.
    </div>
  </footer>

  <!-- Bootstrap JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
