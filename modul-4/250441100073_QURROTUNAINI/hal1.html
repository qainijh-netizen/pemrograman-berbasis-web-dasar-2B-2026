<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif;">

    <div style="display:flex; height:100vh;">

      
        <div style="
            width:50%;
            background:linear-gradient(to bottom right, #5f7fdc, #4a67c2);
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:left;
            padding:40px;
        ">
            <h1 style="font-size:40px; margin-bottom:20px;">
                Hello Prospective <br> Students
            </h1>

            <img src="gambar_login page.png" 
                 style="width:500px; margin-bottom:20px;">

            <p style="max-width:400px; font-size:16px; line-height:1.5;">
                Unlock your professional potential. Learn from industry 
                leaders and stay ahead of the competition.
            </p>
        </div>

       
        <div style="
            width:50%;
            background:#f4f6fb;
            display:flex;
            justify-content:center;
            align-items:center;
        ">

            <div style="
                width:300px;
                text-align:center;
            ">
                <h2 style="margin-bottom:5px;">LOGIN PAGE</h2>
                <p style="font-size:12px; color:#777;">
                    Masukkan Username dan Password Anda
                </p>

                <input type="text" placeholder="Email Address"
                    style="
                        width:100%;
                        padding:12px;
                        margin:10px 0;
                        border:none;
                        border-radius:8px;
                        box-shadow:0 2px 5px rgba(0,0,0,0.1);
                    ">

                <input type="password" placeholder="Password"
                    style="
                        width:100%;
                        padding:12px;
                        margin:10px 0;
                        border:none;
                        border-radius:8px;
                        box-shadow:0 2px 5px rgba(0,0,0,0.1);
                    ">

                <button style="
                    width:100%;
                    padding:12px;
                    background:#4a67c2;
                    color:white;
                    border:none;
                    border-radius:8px;
                    margin-top:10px;
                    cursor:pointer;
                ">
                    Login
                </button>

                <p style="margin:15px 0; font-size:12px; color:#aaa;">
                    Or Login With
                </p>

                <button style="
                    width:100%;
                    padding:10px;
                    border:none;
                    border-radius:8px;
                    background:white;
                    box-shadow:0 2px 5px rgba(0,0,0,0.1);
                    cursor:pointer;
                ">
                    <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" 
                         style="width:18px; vertical-align:middle;">
                    <span style="margin-left:8px;">
                        Sign in with Google
                    </span>
                </button>

            </div>

        </div>

    </div>

</body>
</html>
